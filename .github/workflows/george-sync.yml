name: George Sync

on:
  schedule:
    - cron: '7 */3 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode (sync | block)'
        required: false
        default: 'sync'
  repository_dispatch:
    types: [strava-activity]

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run TP Poster
        env:
          BLOCKWORK_URL: https://blockwork-91h.pages.dev
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
          TP_AUTH_COOKIE: ${{ secrets.TP_AUTH_COOKIE }}
          MODE: ${{ github.event.inputs.mode || 'sync' }}
        run: npx tsx scripts/tp-poster.ts

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tp-poster-debug
          path: /tmp/tp-*.png
          if-no-files-found: ignore
