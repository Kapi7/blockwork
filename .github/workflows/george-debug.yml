name: George Debug

# Manual-only. Calls a debug endpoint via env vars (no ${{ }} inside run:).
# Endpoint value validated against an allow-list regex before use.

on:
  workflow_dispatch:
    inputs:
      endpoint:
        description: 'debug-zones | debug-structure | debug-compute-zones | debug-proxy'
        required: true
        default: 'debug-zones'
      path:
        description: 'TP path for debug-proxy only (e.g. /fitness/v6/athletes/3030673/zones)'
        required: false
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Call debug endpoint safely
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
          ENDPOINT: ${{ inputs.endpoint }}
          TP_PATH: ${{ inputs.path }}
        run: |
          set -eu
          # Allow-list validation
          case "$ENDPOINT" in
            debug-zones|debug-structure|debug-compute-zones|debug-proxy) ;;
            *) echo "Invalid endpoint: $ENDPOINT"; exit 1 ;;
          esac
          # Path is only meaningful for debug-proxy; validate it starts with /
          EXTRA=""
          if [ "$ENDPOINT" = "debug-proxy" ]; then
            case "$TP_PATH" in
              /*) ;;
              *) echo "debug-proxy requires path starting with /"; exit 1 ;;
            esac
            # URL-encode path minimally (spaces to %20)
            ENCODED=$(printf '%s' "$TP_PATH" | sed 's/ /%20/g')
            EXTRA="&path=${ENCODED}"
          fi
          URL="https://blockwork-91h.pages.dev/api/george/${ENDPOINT}?token=${SYNC_TOKEN}${EXTRA}"
          curl -sS "$URL" | head -c 40000
          echo ""
