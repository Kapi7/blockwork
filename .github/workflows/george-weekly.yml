name: George Weekly Review

on:
  schedule:
    # Sunday 17:47 UTC = 20:47 Cyprus (end of training week)
    - cron: '47 17 * * 0'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call George Weekly
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          curl -sS -X POST "https://blockwork-91h.pages.dev/api/george/weekly?token=${SYNC_TOKEN}" | head -c 4000
          echo ""
